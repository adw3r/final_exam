upstream api_server {
    server api:3000;
}
server {
    listen 8000;

    root   /usr/share/nginx/html;
    index  index.html;

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
    location /api {
        proxy_pass http://api_server/api;
    }
}
